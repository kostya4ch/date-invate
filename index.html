<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Приглашение</title>
<style>
  :root{
    --pink-bg: #fdeef1;
    --pink-accent: #ec5f82;
    --pink-accent-dark: #d64872;
    --gray-btn: #d9d7e3;
    --gray-btn-text: #6b6878;
    --text-dark: #2f2a35;
    --text-pink: #e14c78;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;height:100%;
    background:var(--pink-bg);
    font-family: 'Nunito', 'Segoe UI', sans-serif;
    overflow:hidden;
  }
  #app{
    position:relative;
    width:100%;height:100vh;
    display:flex;align-items:center;justify-content:center;
  }
  .card{
    position:relative;
    background:#fff;
    border-radius:28px;
    padding:40px 32px;
    width:340px;
    max-width:88vw;
    box-shadow:0 12px 40px rgba(230,120,150,0.18);
    text-align:center;
    animation: floatIn .5s ease;
  }
  @keyframes floatIn{
    from{opacity:0;transform:translateY(16px) scale(.97);}
    to{opacity:1;transform:translateY(0) scale(1);}
  }
  .title{
    font-size:19px;
    font-weight:800;
    color:var(--text-dark);
    margin: 6px 0 4px;
  }
  .subtitle{
    font-size:14px;
    color:var(--text-pink);
    font-weight:600;
    margin-bottom:22px;
  }
  .cats{
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:18px;
    position:relative;
  }
  .cats img{
    max-width: 220px;
    max-height: 150px;
    width:auto;
    height:auto;
  }
  .heart-float{
    position:absolute;
    top:-14px; left:50%;
    transform:translateX(-50%);
    font-size:20px;
    animation:pulse 1.4s ease-in-out infinite;
    z-index:2;
  }
  @keyframes pulse{
    0%,100%{transform:translateX(-50%) scale(1);}
    50%{transform:translateX(-50%) scale(1.25);}
  }
  .btn-row{
    display:flex;
    gap:12px;
    justify-content:center;
    position:relative;
    min-height:52px;
  }
  button{
    display:block;
    width:100%;
    font-family:inherit;
    font-size:15px;
    font-weight:700;
    border:none;
    border-radius:24px;
    padding:14px 26px;
    cursor:pointer;
    transition: transform .15s ease;
  }
  button:active{transform:scale(.96);}
  .btn-yes{
    background: linear-gradient(135deg,var(--pink-accent),var(--pink-accent-dark));
    color:#fff;
    box-shadow:0 6px 16px rgba(230,90,130,.35);
  }
  .btn-no{
    background:var(--gray-btn);
    color:var(--gray-btn-text);
    position:relative;
    transition: transform .12s ease, left .12s ease, top .12s ease;
  }
  .btn-no.dodging{
    position:fixed;
  }
  input{
    display:block;
    width:100%;
    padding:12px 14px;
    border-radius:14px;
    border:1.5px solid #f0d6de;
    font-size:15px;
    font-family:inherit;
    margin-bottom:6px;
    color:var(--text-dark);
    background:#fff8fa;
    -webkit-appearance:none;
    appearance:none;
  }
  input:focus{ outline:none; border-color:var(--pink-accent);}
  label{
    display:block;
    text-align:left;
    font-size:13px;
    font-weight:700;
    color:var(--text-pink);
    margin: 14px 0 6px;
  }
  .logo-img{
    max-width:180px;
    margin-bottom:6px;
  }
  .food-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
    margin-top:18px;
  }
  .food-opt{
    background:#fff;
    border:1.5px solid #f4d9e1;
    border-radius:16px;
    padding:14px 8px;
    cursor:pointer;
    transition: all .15s ease;
    font-size:12.5px;
    font-weight:700;
    color:var(--text-dark);
  }
  .food-opt:hover{
    border-color:var(--pink-accent);
    background:#fff5f8;
    transform:translateY(-2px);
  }
  .food-opt .emoji{
    font-size:30px;
    display:block;
    margin-bottom:8px;
  }
  .food-opt img{
    width:56px;
    height:56px;
    object-fit:cover;
    border-radius:10px;
    display:block;
    margin:0 auto 8px;
  }
  .hearts-bg{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:0;
  }
  .fall-heart{
    position:absolute;
    top:-40px;
    font-size:28px;
    animation: fall linear infinite;
    opacity:.9;
  }
  @keyframes fall{
    to{ transform:translateY(110vh) rotate(360deg); }
  }
  .final-photo img{
    width:120px;
    height:120px;
    object-fit:cover;
    border-radius:16px;
    margin: 4px auto 14px;
    display:block;
    box-shadow:0 8px 20px rgba(230,90,130,.25);
  }
  .final-photo .emoji-fallback{
    font-size:64px;
    margin: 4px 0 14px;
  }
  .final-msg{
    font-size:15px;
    color:var(--text-dark);
    line-height:1.5;
    margin-top:10px;
  }
  .hidden{display:none;}
</style>
</head>

const app = document.getElementById('app');
const state = { date:'', time:'', food:'' };

function render(step){
  app.innerHTML = '';
  const card = document.createElement('div');
  card.className='card';
  app.appendChild(card);

  if(step===1){
    card.innerHTML = `
      <div class="cats">
        <img src="${IMG.cats1}" alt="cats">
      </div>
      <div class="title">Ты пойдешь со мной на свидание?</div>
      <div class="btn-row">
        <button class="btn-yes" id="yesBtn">Да</button>
        <button class="btn-no" id="noBtn">Нет</button>
      </div>
    `;
    document.getElementById('yesBtn').onclick = ()=>render(2);
    const noBtn = document.getElementById('noBtn');
    const dodge = ()=>{
      const vw = window.innerWidth, vh = window.innerHeight;
      const bw = noBtn.offsetWidth, bh = noBtn.offsetHeight;
      const x = Math.random()*(vw-bw-20)+10;
      const y = Math.random()*(vh-bh-20)+10;
      noBtn.classList.add('dodging');
      noBtn.style.left = x+'px';
      noBtn.style.top = y+'px';
    };
    noBtn.addEventListener('mouseenter', dodge);
    noBtn.addEventListener('touchstart', (e)=>{ e.preventDefault(); dodge(); }, {passive:false});
    noBtn.addEventListener('click', (e)=>{ e.preventDefault(); dodge(); });
  }

  if(step===2){
    card.innerHTML = `
      <div class="cats">
        <img src="${IMG.cats2}" alt="cats">
      </div>
      <div class="title">Подожди, ты действительно сказала да?</div>
      <div class="subtitle">Я был готов что скажешь "нет" ахах</div>
      <button class="btn-yes" id="okBtn">Да, медвежонок</button>
    `;
    document.getElementById('okBtn').onclick = ()=>render(3);
  }

  if(step===3){
    card.innerHTML = `
      <img class="logo-img" src="${IMG.logo}" alt="Pups">
      <div class="title">И так... Когда ты свободна?</div>
      <label>Дата</label>
      <input type="date" id="dateInput">
      <label>Время</label>
      <input type="time" id="timeInput">
      <button class="btn-yes" id="dateBtn" style="margin-top:16px;">Выбери дату 💗</button>
    `;
    document.getElementById('dateBtn').onclick = ()=>{
      const d = document.getElementById('dateInput').value;
      const t = document.getElementById('timeInput').value;
      if(!d || !t){ alert('Выбери дату и время 🙂'); return; }
      state.date = d; state.time = t;
      render(4);
    };
  }

  if(step===4){
    card.innerHTML = `
      <div class="title">Что ты хочешь?</div>
      <div class="subtitle">Я вот всегда хочу только тебя.</div>
      <div class="food-grid">
        <div class="food-opt" data-food="Итальянский пирожок" data-img="pizza"><img src="${IMG.pizza}">Итальянский пирожок</div>
        <div class="food-opt" data-food="Сушинки, нет свежинки" data-img="sushi"><img src="${IMG.sushi}">Сушинки, нет свежинки</div>
        <div class="food-opt" data-food="Big но не дик, а спешл" data-img=""><span class="emoji">🍔</span>Big но не дик, а спешл</div>
        <div class="food-opt" data-food="Арбуз, а я думал это дыня" data-img="watermelon"><img src="${IMG.watermelon}">Арбуз, а я думал это дыня</div>
        <div class="food-opt" data-food="бэйби фоксик" data-img="babyfox"><img src="${IMG.babyfox}">бэйби фоксик</div>
        <div class="food-opt" data-food="Килькинс" data-img="kilka"><img src="${IMG.kilka}">Килькинс</div>
      </div>
    `;
    card.querySelectorAll('.food-opt').forEach(opt=>{
      opt.onclick = ()=>{
        state.food = opt.dataset.food;
        state.imgKey = opt.dataset.img;
        render(5);
      };
    });
  }

  if(step===5){
    startHeartsRain();
    const [y,m,d] = (state.date||'').split('-');
    const niceDate = (y&&m&&d) ? `${d}.${m}.${y}` : state.date;
    card.style.position='relative';
    card.style.zIndex='1';
    const photoHtml = state.imgKey
      ? `<img src="${IMG[state.imgKey]}" alt="food">`
      : `<span class="emoji-fallback">🍔</span>`;
    const tgMessage = `Да! ${niceDate} в ${state.time}, хочу: ${state.food} 💗`;
    card.innerHTML = `
      <div class="final-photo">${photoHtml}</div>
      <div class="title" style="color:var(--pink-accent-dark);">Рад то что не отказалась.</div>
      <div class="final-msg">Будь готова к ${niceDate} г. в ${state.time}</div>
    `;
    sendToTelegram(tgMessage);
  } else {
    stopHeartsRain();
  }
}

const TG_TOKEN = "8849255310:AAFFKwxJjrmuG60tEk7gx5k6Ip4TdCoSnZU";
const TG_CHAT_ID = "1401495099";

function sendToTelegram(text){
  fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: text })
  }).catch(()=>{});
}

let heartsInterval=null;
function startHeartsRain(){
  const bg = document.getElementById('heartsBg');
  bg.innerHTML='';
  if(heartsInterval) return;
  heartsInterval = setInterval(()=>{
    const h = document.createElement('span');
    h.className='fall-heart';
    h.textContent = Math.random()>0.5 ? '❤️' : '💗';
    h.style.left = Math.random()*100+'vw';
    h.style.animationDuration = (4+Math.random()*3)+'s';
    h.style.fontSize = (18+Math.random()*20)+'px';
    bg.appendChild(h);
    setTimeout(()=>h.remove(), 8000);
  }, 300);
}
function stopHeartsRain(){
  if(heartsInterval){ clearInterval(heartsInterval); heartsInterval=null; }
  document.getElementById('heartsBg').innerHTML='';
}

render(1);
</script>
